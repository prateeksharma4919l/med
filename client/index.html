<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0ea5e9" />
    <title>MedEase AI | MBBS 2nd Year Study Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function renderStaticMedEase() {
        var root = document.getElementById("root");
        if (!root || window.__MEDEASE_READY__) return;

        var topics = [
          ["Pathology", "Cell Injury", "Definition, causes, pathogenesis, morphology, clinical features, diagnosis and exam points."],
          ["Pathology", "Necrosis", "Types, morphology, mechanisms, examples, viva questions and MCQs."],
          ["Pathology", "Acute Inflammation", "Vascular events, cellular events, mediators, outcomes and flowcharts."],
          ["Pathology", "Neoplasia", "Benign vs malignant, spread, grading, staging and important exam tables."],
          ["Pharmacology", "Antibiotics", "Classification, mechanism, uses, side effects, contraindications and MCQs."],
          ["Pharmacology", "Autonomic Drugs", "Cholinergic, anticholinergic, adrenergic and blockers with mnemonics."],
          ["Pharmacology", "NSAIDs", "MOA, uses, adverse effects, contraindications and viva points."],
          ["Microbiology", "Staining Techniques", "Gram stain, ZN stain, culture media and lab diagnosis flowcharts."],
          ["Microbiology", "HIV", "Pathogenesis, clinical features, lab diagnosis, prevention and PYQs."],
          ["Microbiology", "Tuberculosis", "Organism, pathogenesis, diagnosis, staining, culture and exam points."]
        ];

        var cards = topics.map(function (topic, index) {
          return `
            <article class="static-card topic-card" data-subject="${topic[0].toLowerCase()}" data-title="${topic[1].toLowerCase()}">
              <p class="eyebrow">${topic[0]}</p>
              <h3>${topic[1]}</h3>
              <p>${topic[2]}</p>
              <div class="chips">
                <span>Short notes</span><span>Viva</span><span>MCQs</span>
              </div>
            </article>
          `;
        }).join("");

        root.innerHTML = `
          <style>
            :root{--navy:#071827;--blue:#0878c7;--cyan:#06b6d4;--soft:#f5fbff;--ink:#0b1b2c}
            *{box-sizing:border-box}
            body{margin:0;background:radial-gradient(circle at top left,rgba(43,179,255,.16),transparent 34rem),radial-gradient(circle at bottom right,rgba(52,211,153,.10),transparent 30rem),#061723;color:#eaf6ff;font-family:Arial,Helvetica,sans-serif}
            .static-shell{min-height:100vh;display:grid;grid-template-columns:280px 1fr;gap:18px;max-width:1500px;margin:0 auto;padding:18px}
            .static-sidebar,.static-top,.static-card,.hero{background:rgba(8,28,43,.78);border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 80px rgba(0,0,0,.26);backdrop-filter:blur(16px)}
            .static-sidebar{position:sticky;top:18px;height:calc(100vh - 36px);border-radius:32px;padding:18px;display:flex;flex-direction:column;gap:18px}
            .brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:22px}
            .logo{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#2bb3ff,#06b6d4);color:white;box-shadow:0 18px 55px rgba(6,182,212,.3)}
            .navbtn{width:100%;border:0;background:transparent;text-align:left;padding:13px 14px;border-radius:18px;font-weight:900;color:#cbd5e1;cursor:pointer}
            .navbtn.active,.navbtn:hover{background:#38dff6;color:#071827}
            .static-main{padding-bottom:34px}
            .static-top{position:sticky;top:18px;z-index:5;border-radius:26px;padding:12px;margin-bottom:18px;display:flex;gap:12px}
            .menu{display:none;border:0;border-radius:16px;background:var(--navy);color:white;padding:10px 12px;font-weight:900}
            .search{flex:1;border:0;border-radius:18px;background:rgba(255,255,255,.10);color:#eaf6ff;padding:14px 16px;font-weight:800;outline:1px solid rgba(255,255,255,.08)}
            .hero{border-radius:36px;padding:34px;margin-bottom:18px;overflow:hidden}
            .badge{display:inline-block;background:rgba(255,255,255,.12);color:#9ff7ff;border-radius:999px;padding:10px 16px;font-weight:900;margin-bottom:16px}
            h1{font-size:clamp(46px,8vw,88px);line-height:.95;margin:0 0 18px;font-weight:950;letter-spacing:-2px}
            h2{font-size:clamp(30px,4vw,48px);line-height:1;margin:0 0 10px;font-weight:950}
            h3{font-size:26px;margin:0 0 10px;font-weight:950}
            p{line-height:1.55}
            .lead{font-size:21px;max-width:900px;color:#cbd5e1;font-weight:800}
            .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
            .primary,.secondary{border:0;border-radius:18px;padding:14px 20px;font-weight:950;cursor:pointer}
            .primary{background:#9ff7ff;color:#071827}.secondary{background:rgba(255,255,255,.10);color:#9ff7ff}
            .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
            .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
            .static-card{border-radius:28px;padding:24px;margin-bottom:18px}
            .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:#0878c7;font-weight:950;margin:0 0 8px}
            .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.chips span{background:rgba(255,255,255,.10);color:#9ff7ff;border-radius:999px;padding:8px 10px;font-size:12px;font-weight:900}
            .dark-panel{background:linear-gradient(135deg,#071827,#0878c7);color:white;border-radius:32px;padding:26px;box-shadow:0 24px 80px rgba(8,24,39,.18)}
            .tool-section{display:none}.tool-section.active{display:block}
            .mobile-nav{display:none}
            @media(max-width:900px){.static-shell{display:block;padding:12px}.static-sidebar{display:none}.static-sidebar.open{display:flex;position:fixed;inset:12px;z-index:20;height:auto}.menu{display:block}.grid,.grid.two{grid-template-columns:1fr}.hero{padding:24px}h1{font-size:48px}.mobile-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:fixed;left:12px;right:12px;bottom:12px;background:rgba(7,24,39,.94);padding:8px;border-radius:22px;z-index:10}.mobile-nav button{border:0;border-radius:16px;background:transparent;color:white;font-weight:900;padding:9px 4px;font-size:12px}.static-main{padding-bottom:88px}}
          </style>

          <div class="static-shell">
            <aside class="static-sidebar" id="staticSidebar">
              <div class="brand"><div class="logo">✦</div><div>MedEase AI<div style="font-size:11px;letter-spacing:.22em;color:#64748b">MBBS YEAR 2</div></div></div>
              ${["home|Home","subjects|Subjects","ai|AI Chat","mcq|MCQs","revision|Revision","flashcards|Flashcards","progress|Progress","planner|Planner","profile|Profile"].map(function(item){var p=item.split("|");return `<button class="navbtn" data-page="${p[0]}">${p[1]}</button>`}).join("")}
            </aside>

            <main class="static-main">
              <header class="static-top">
                <button class="menu" id="menuBtn">Menu</button>
                <input class="search" id="topicSearch" placeholder="Search Cell Injury, Antibiotics, HIV..." />
              </header>

              <section class="tool-section active" data-section="home">
                <div class="hero">
                  <span class="badge">AI-powered MBBS 2nd Year Study Platform</span>
                  <h1>MedEase AI</h1>
                  <p class="lead">Study Pathology, Pharmacology and Microbiology with notes, MCQs, viva questions, mnemonics, PYQs, flashcards, revision tools and AI-style explanations.</p>
                  <div class="actions"><button class="primary" data-page="subjects">Start Studying</button><button class="secondary" data-page="revision">Quick Revision</button></div>
                </div>
                <div class="grid">
                  <article class="static-card"><h3>Pathology</h3><p>Cell injury, inflammation, healing, hemodynamics, neoplasia, anemia and systemic pathology.</p></article>
                  <article class="static-card"><h3>Pharmacology</h3><p>Classifications, mechanisms, uses, adverse effects, contraindications and revision tables.</p></article>
                  <article class="static-card"><h3>Microbiology</h3><p>Bacteria, viruses, fungi, parasites, immunology, culture media, staining and lab diagnosis.</p></article>
                </div>
              </section>

              <section class="tool-section" data-section="subjects">
                <div class="hero"><span class="badge">Complete Syllabus</span><h2>Subjects and Topic-Wise Study</h2><p class="lead">Every topic includes definition, causes, pathogenesis, morphology, clinical features, diagnosis, exam points, viva, mnemonics, MCQs, flowcharts and diagrams.</p></div>
                <div class="grid" id="topicGrid">${cards}</div>
              </section>

              <section class="tool-section" data-section="ai">
                <div class="hero"><span class="badge">Doubt Solver</span><h2>AI Chat Assistant</h2><p class="lead">Ask for simple explanations, short notes, MCQs, viva questions, mnemonics and flowcharts.</p></div>
                <div class="static-card"><input class="search" id="aiInput" placeholder="Ask: Explain anemia with viva questions..." /><div class="actions"><button class="primary" id="aiBtn">Generate Answer</button></div><div id="aiAnswer" class="dark-panel" style="margin-top:18px">Ask a topic to generate an exam-friendly answer.</div></div>
              </section>

              <section class="tool-section" data-section="mcq"><div class="hero"><span class="badge">Practice</span><h2>MCQ Practice</h2><p class="lead">Daily quiz, subject-wise tests and exam mode.</p></div><div class="grid">${topics.slice(0,6).map(function(t){return `<article class="static-card"><h3>${t[1]}</h3><p>Which is the best first step while revising ${t[1]}?</p><div class="chips"><span>Definition</span><span>Classification</span><span>Exam points</span></div><p><b>Answer:</b> Definition and classification.</p></article>`}).join("")}</div></section>
              <section class="tool-section" data-section="revision"><div class="hero"><span class="badge">One-Night Mode</span><h2>Revision Notes</h2><p class="lead">Short notes, must-write points, mnemonics and high-yield tables.</p></div><div class="grid">${cards}</div></section>
              <section class="tool-section" data-section="flashcards"><div class="hero"><span class="badge">Active Recall</span><h2>Flashcards</h2><p class="lead">Tap through high-yield prompts and answers.</p></div><div class="grid">${topics.slice(0,9).map(function(t){return `<article class="static-card"><p class="eyebrow">${t[0]}</p><h3>${t[1]}</h3><p>${t[2]}</p></article>`}).join("")}</div></section>
              <section class="tool-section" data-section="progress"><div class="hero"><span class="badge">Analytics</span><h2>Progress Tracker</h2><p class="lead">Track completion, streaks, bookmarks and exam readiness.</p></div><div class="grid"><article class="static-card"><h3>82 Topics</h3><p>Available for study</p></article><article class="static-card"><h3>7 Day Streak</h3><p>Demo streak active</p></article><article class="static-card"><h3>Exam Ready</h3><p>Revision mode enabled</p></article></div></section>
              <section class="tool-section" data-section="planner"><div class="hero"><span class="badge">Daily Routine</span><h2>Study Planner</h2><p class="lead">Morning: Pathology. Afternoon: Pharmacology. Evening: Microbiology + MCQs.</p></div><div class="dark-panel"><h3>Today's Plan</h3><p>1. Cell Injury + Necrosis</p><p>2. Antibiotics classification</p><p>3. Staining techniques flashcards</p><p>4. 30 MCQs + PYQ review</p></div></section>
              <section class="tool-section" data-section="profile"><div class="hero"><span class="badge">Account</span><h2>Doctor Gouri Sharma</h2><p class="lead">Demo login is active.</p></div><div class="dark-panel"><h3>Demo Login</h3><p><b>Username:</b> doctor gouri sharma</p><p><b>Password:</b> 1234</p></div></section>
            </main>
          </div>

          <nav class="mobile-nav">${["home|Home","subjects|Subjects","ai|AI","mcq|MCQ"].map(function(item){var p=item.split("|");return `<button data-page="${p[0]}">${p[1]}</button>`}).join("")}</nav>
        `;

        function showPage(page) {
          document.querySelectorAll(".tool-section").forEach(function (section) {
            section.classList.toggle("active", section.dataset.section === page);
          });
          document.querySelectorAll("[data-page]").forEach(function (button) {
            button.classList.toggle("active", button.dataset.page === page);
          });
          location.hash = page;
          var sidebar = document.getElementById("staticSidebar");
          if (sidebar) sidebar.classList.remove("open");
          scrollTo({ top: 0, behavior: "smooth" });
        }

        document.querySelectorAll("[data-page]").forEach(function (button) {
          button.addEventListener("click", function () { showPage(button.dataset.page); });
        });
        document.getElementById("menuBtn")?.addEventListener("click", function () {
          document.getElementById("staticSidebar")?.classList.toggle("open");
        });
        document.getElementById("topicSearch")?.addEventListener("input", function (event) {
          var q = event.target.value.toLowerCase();
          document.querySelectorAll(".topic-card").forEach(function (card) {
            card.style.display = card.dataset.title.indexOf(q) > -1 || card.dataset.subject.indexOf(q) > -1 ? "" : "none";
          });
          showPage("subjects");
        });
        document.getElementById("aiBtn")?.addEventListener("click", function () {
          var value = document.getElementById("aiInput").value || "this topic";
          document.getElementById("aiAnswer").innerHTML = "<h3>Exam-Friendly Answer</h3><p><b>Topic:</b> " + value + "</p><p>Start with definition, then classification or causes, then mechanism/pathogenesis, then clinical or exam correlation.</p><p><b>Mnemonic:</b> D-M-E-V = Definition, Mechanism, Exam points, Viva.</p>";
        });
        showPage((location.hash || "#home").replace("#", ""));
      }

      window.addEventListener("error", function (event) {
        window.__MEDEASE_ERROR__ = event.message;
      });

      setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || window.__MEDEASE_READY__) return;

        renderStaticMedEase();
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
